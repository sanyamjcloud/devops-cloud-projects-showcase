name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3. Install dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t flask-app .

      # 5. (Optional) Push Docker image to Docker Hub
      - name: Log in to Docker Hub
        if: github.repository == 'sanyamjcloud/flask-app-ci-cd-docker-pipeline'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.repository == 'sanyamjcloud/flask-app-ci-cd-docker-pipeline'
        run: docker push flask-app:latest

      # 6. (Optional) Deploy to AWS EC2 via SSH
      # You can add SSH steps here if you have your EC2 details
